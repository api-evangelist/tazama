vocabulary:
  name: Tazama Vocabulary
  description: >-
    Domain vocabulary for Tazama open source real-time transaction monitoring,
    fraud detection, and AML compliance platform.
  url: https://tazama.org
  version: '2026-05-03'
  tags:
    - Financial Technology
    - Fraud Detection
    - Anti-Money Laundering
    - Transaction Monitoring
    - ISO 20022

terms:

  - term: Tazama
    definition: >-
      Open source platform for real-time financial transaction monitoring, fraud
      detection, and AML compliance, launched by Linux Foundation Charities.
    type: Platform
    tags:
      - Brand

  - term: Transaction Monitoring Service
    abbreviation: TMS
    definition: >-
      The core Tazama API service that ingests ISO 20022 financial transaction messages
      and orchestrates the fraud and AML evaluation pipeline.
    type: Service
    tags:
      - Core Service

  - term: Rule Processor
    definition: >-
      A microservice that evaluates incoming transactions against a specific fraud
      or money laundering detection rule and returns a score result.
    type: Component
    tags:
      - Processing

  - term: Typology Processor
    definition: >-
      A service that aggregates rule processor results for a given typology and
      calculates an overall typology score.
    type: Component
    tags:
      - Processing
      - Scoring

  - term: Typology
    definition: >-
      A defined pattern of financial behavior associated with fraud or money laundering,
      composed of multiple rules. Examples include structuring, smurfing, and layering.
    type: Domain Concept
    tags:
      - Fraud
      - AML

  - term: TADProc
    definition: >-
      Transaction Aggregation and Decisioning Processor. Consolidates all typology
      scores for a transaction and issues the final ACCEPT, REVIEW, or BLOCK decision.
    type: Component
    tags:
      - Decisioning

  - term: Network Map
    definition: >-
      A configuration document that maps incoming ISO 20022 message types to the
      rules and typologies that should evaluate them.
    type: Configuration
    tags:
      - Configuration

  - term: ISO 20022
    definition: >-
      International standard for financial messaging. Tazama accepts transactions in
      ISO 20022 format including pain.001, pain.013, pacs.008, and pacs.002 message types.
    type: Standard
    tags:
      - Standard
      - Protocol

  - term: pain.001
    definition: >-
      ISO 20022 Customer Credit Transfer Initiation message. Historically corresponds
      to a Mojaloop Quote message in Tazama's Mojaloop integration.
    type: Message Type
    tags:
      - ISO 20022

  - term: pain.013
    definition: >-
      ISO 20022 Creditor Payment Activation Request message. Historically corresponds
      to a Mojaloop Quote Response message.
    type: Message Type
    tags:
      - ISO 20022

  - term: pacs.008
    definition: >-
      ISO 20022 Financial Institution to Financial Institution Customer Credit Transfer
      message. Historically corresponds to a Mojaloop Transfer message.
    type: Message Type
    tags:
      - ISO 20022

  - term: pacs.002
    definition: >-
      ISO 20022 Financial Institution to Financial Institution Payment Status Report message.
    type: Message Type
    tags:
      - ISO 20022

  - term: Payment Platform Adapter
    abbreviation: PPA
    definition: >-
      A Tazama service that transforms non-ISO 20022 transaction messages into
      ISO 20022 compatible formats for processing by the TMS.
    type: Component
    tags:
      - Integration
      - Adapter

  - term: DFSP
    definition: >-
      Digital Financial Service Provider. A financial institution such as a bank,
      mobile money operator, or payment switch that sends transactions to Tazama.
    type: Actor
    tags:
      - Participant

  - term: AML
    definition: >-
      Anti-Money Laundering. Regulatory compliance requirement to detect and prevent
      financial transactions used to launder illegally obtained funds.
    type: Regulatory Concept
    tags:
      - Compliance
      - Regulatory

  - term: Alert
    definition: >-
      A notification generated by Tazama when a transaction's typology scores
      exceed defined thresholds, indicating potential fraud or money laundering.
    type: Domain Concept
    tags:
      - Fraud Detection
      - Notification

  - term: Case Management System
    abbreviation: CMS
    definition: >-
      An external system that receives investigation alerts and case data from
      Tazama for human review and disposition.
    type: Integration
    tags:
      - Investigation
      - Integration

  - term: NATS
    definition: >-
      High-performance messaging system used by Tazama for inter-service event
      streaming between microservices.
    type: Infrastructure
    tags:
      - Infrastructure
      - Messaging

  - term: ArangoDB
    definition: >-
      Multi-model database used by Tazama for storing transaction data and
      participant relationship graphs.
    type: Infrastructure
    tags:
      - Infrastructure
      - Database
