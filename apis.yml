aid: tazama
name: Tazama
description: Tazama is the first open source platform for real-time financial monitoring and fraud detection, launched by
  Linux Foundation Charities with support from the Bill and Melinda Gates Foundation. It provides real-time fraud management,
  AML compliance, and cost-effective monitoring of digital financial transactions through a microservices architecture with
  rule processors, typology scoring, and case management integration. Built to ISO 20022 standards for maximum financial messaging
  interoperability.
