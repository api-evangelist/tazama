apis:
- aid: tazama:transaction-monitoring-service
  name: Tazama Transaction Monitoring Service API
  description: The core API for ingesting real-time ISO 20022 financial transaction messages into the Tazama platform for
    fraud detection and AML compliance. Accepts pain.001, pain.013, pacs.008, and pacs.002 message types from financial service
    providers including banks, remitters, mobile money operators, clearing houses, and payment switches. Validates messages,
    routes them through configurable rule processors, and returns fraud and AML evaluation results.
  humanURL: https://tazama.org/products/
  baseURL: http://localhost:5000
  tags:
  - Transaction Monitoring
  - ISO 20022
  - Fraud Detection
  - Real Time
