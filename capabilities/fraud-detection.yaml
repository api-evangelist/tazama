naftiko: 1.0.0-alpha2
info:
  label: Tazama Fraud Detection
  description: Workflow capability for real-time financial transaction fraud detection and AML compliance monitoring using
    the Tazama platform. Enables financial service providers to submit ISO 20022 transaction messages for immediate evaluation
    against configurable fraud detection rules and typology scoring.
  tags:
  - Tazama
  - Financial Technology
  - Fraud Detection
  - Anti-Money Laundering
  - ISO 20022
  - Transaction Monitoring
  - Compliance
  created: '2026-05-03'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    TAZAMA_API_KEY: TAZAMA_API_KEY
capability:
  consumes:
  - type: http
    namespace: tazama-tms
    baseUri: http://localhost:5000
    description: Tazama Transaction Monitoring Service for ISO 20022 fraud detection
    authentication:
      type: apikey
      key: Authorization
      value: '{{TAZAMA_API_KEY}}'
      placement: header
    resources:
    - name: health
      path: /health
      description: Service health check
      operations:
      - name: get-health-status
        method: GET
        description: Check the health status of the Transaction Monitoring Service
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: transaction-evaluation
      path: /v1/evaluate/iso20022
      description: ISO 20022 transaction evaluation for fraud and AML detection
      operations:
      - name: evaluate-pain001-transaction
        method: POST
        description: Evaluate ISO 20022 pain.001.001.11 Customer Credit Transfer Initiation
        body:
          type: json
          data:
            CstmrCdtTrfInitn: '{{tools.transaction}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: evaluate-pain013-transaction
        method: POST
        description: Evaluate ISO 20022 pain.013.001.09 Creditor Payment Activation Request
        body:
          type: json
          data:
            CdtrPmtActvtnReq: '{{tools.transaction}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: evaluate-pacs008-transaction
        method: POST
        description: Evaluate ISO 20022 pacs.008.001.10 FI to FI Customer Credit Transfer
        body:
          type: json
          data:
            FIToFICstmrCdtTrf: '{{tools.transaction}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: evaluate-pacs002-transaction
        method: POST
        description: Evaluate ISO 20022 pacs.002.001.12 Payment Status Report
        body:
          type: json
          data:
            FIToFIPmtSts: '{{tools.transaction}}'
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
  exposes:
  - type: rest
    port: 8080
    namespace: tazama-fraud-detection-api
    description: Unified REST API for Tazama real-time fraud detection and AML monitoring.
    resources:
    - path: /v1/health
      name: health
      description: Service health monitoring
      operations:
      - method: GET
        name: get-health
        description: Check Tazama platform health status
        call: tazama-tms.get-health-status
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/transactions/credit-transfers
      name: credit-transfers
      description: Customer credit transfer transaction evaluation
      operations:
      - method: POST
        name: evaluate-credit-transfer
        description: Submit credit transfer initiation (pain.001) for fraud and AML evaluation
        call: tazama-tms.evaluate-pain001-transaction
        with:
          transaction: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/transactions/payment-activations
      name: payment-activations
      description: Creditor payment activation request evaluation
      operations:
      - method: POST
        name: evaluate-payment-activation
        description: Submit creditor payment activation request (pain.013) for evaluation
        call: tazama-tms.evaluate-pain013-transaction
        with:
          transaction: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/transactions/interbank-transfers
      name: interbank-transfers
      description: FI-to-FI interbank transfer evaluation
      operations:
      - method: POST
        name: evaluate-interbank-transfer
        description: Submit FI-to-FI customer credit transfer (pacs.008) for fraud evaluation
        call: tazama-tms.evaluate-pacs008-transaction
        with:
          transaction: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/transactions/payment-status
      name: payment-status
      description: Payment status report evaluation
      operations:
      - method: POST
        name: evaluate-payment-status
        description: Submit payment status report (pacs.002) for evaluation
        call: tazama-tms.evaluate-pacs002-transaction
        with:
          transaction: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9090
    namespace: tazama-fraud-detection-mcp
    transport: http
    description: MCP server for AI-assisted fraud detection and AML compliance monitoring.
    tools:
    - name: check-tazama-health
      description: Check the operational status of the Tazama fraud detection platform
      hints:
        readOnly: true
        openWorld: false
      call: tazama-tms.get-health-status
      outputParameters:
      - type: object
        mapping: $.
    - name: evaluate-credit-transfer
      description: Submit an ISO 20022 pain.001.001.11 customer credit transfer initiation message for real-time fraud detection
        and AML screening. Returns evaluation results from configured rule processors and typology scoring.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tazama-tms.evaluate-pain001-transaction
      with:
        transaction: tools.transaction
      outputParameters:
      - type: object
        mapping: $.
    - name: evaluate-payment-activation
      description: Submit an ISO 20022 pain.013.001.09 creditor payment activation request for fraud and AML evaluation. Returns
        rule results and typology scores.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tazama-tms.evaluate-pain013-transaction
      with:
        transaction: tools.transaction
      outputParameters:
      - type: object
        mapping: $.
    - name: evaluate-interbank-transfer
      description: Submit an ISO 20022 pacs.008.001.10 FI-to-FI customer credit transfer for real-time fraud detection. Evaluates
        the transfer against all active typologies and returns risk assessment results.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tazama-tms.evaluate-pacs008-transaction
      with:
        transaction: tools.transaction
      outputParameters:
      - type: object
        mapping: $.
    - name: evaluate-payment-status
      description: Submit an ISO 20022 pacs.002.001.12 payment status report for AML compliance evaluation and fraud pattern
        analysis.
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: tazama-tms.evaluate-pacs002-transaction
      with:
        transaction: tools.transaction
      outputParameters:
      - type: object
        mapping: $.
