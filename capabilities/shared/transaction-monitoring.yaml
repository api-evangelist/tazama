naftiko: "1.0.0-alpha1"

info:
  label: "Tazama Transaction Monitoring Service"
  description: >-
    Core API for ingesting ISO 20022 financial transaction messages for real-time
    fraud detection and AML compliance. Supports pain.001, pain.013, pacs.008, and
    pacs.002 message types from financial service providers.
  tags:
    - Tazama
    - Financial Technology
    - Fraud Detection
    - Anti-Money Laundering
    - ISO 20022
    - Transaction Monitoring
  created: "2026-05-03"
  modified: "2026-05-03"

binds:
  - namespace: env
    keys:
      TAZAMA_API_KEY: TAZAMA_API_KEY

capability:
  consumes:
    - type: http
      namespace: tazama-tms
      baseUri: http://localhost:5000
      description: "Tazama Transaction Monitoring Service for ISO 20022 fraud detection"
      authentication:
        type: apikey
        key: Authorization
        value: "{{TAZAMA_API_KEY}}"
        placement: header
      resources:
        - name: health
          path: /health
          description: "Service health check"
          operations:
            - name: get-health-status
              method: GET
              description: "Check the health status of the Transaction Monitoring Service"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: transaction-evaluation
          path: /v1/evaluate/iso20022
          description: "ISO 20022 transaction evaluation for fraud and AML detection"
          operations:
            - name: evaluate-pain001-transaction
              method: POST
              description: "Evaluate ISO 20022 pain.001.001.11 Customer Credit Transfer Initiation"
              body:
                type: json
                data:
                  CstmrCdtTrfInitn: "{{tools.transaction}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: evaluate-pain013-transaction
              method: POST
              description: "Evaluate ISO 20022 pain.013.001.09 Creditor Payment Activation Request"
              body:
                type: json
                data:
                  CdtrPmtActvtnReq: "{{tools.transaction}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: evaluate-pacs008-transaction
              method: POST
              description: "Evaluate ISO 20022 pacs.008.001.10 FI to FI Customer Credit Transfer"
              body:
                type: json
                data:
                  FIToFICstmrCdtTrf: "{{tools.transaction}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

            - name: evaluate-pacs002-transaction
              method: POST
              description: "Evaluate ISO 20022 pacs.002.001.12 Payment Status Report"
              body:
                type: json
                data:
                  FIToFIPmtSts: "{{tools.transaction}}"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

  exposes:
    - type: rest
      port: 8100
      namespace: tazama-tms-api
      resources:
        - path: /v1/health
          name: health-status
          description: "Service health check"
          operations:
            - method: GET
              name: get-health-status
              description: "Check TMS service health"
              call: "tazama-tms.get-health-status"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/transactions/pain001
          name: pain001-evaluation
          description: "Evaluate pain.001.001.11 transactions"
          operations:
            - method: POST
              name: evaluate-pain001
              description: "Submit pain.001 transaction for fraud evaluation"
              call: "tazama-tms.evaluate-pain001-transaction"
              with:
                transaction: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."

        - path: /v1/transactions/pacs008
          name: pacs008-evaluation
          description: "Evaluate pacs.008.001.10 transactions"
          operations:
            - method: POST
              name: evaluate-pacs008
              description: "Submit pacs.008 transfer for fraud evaluation"
              call: "tazama-tms.evaluate-pacs008-transaction"
              with:
                transaction: "rest.body"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: tazama-tms-mcp
      transport: http
      tools:
        - name: get-tms-health
          description: "Check the health status of the Tazama Transaction Monitoring Service"
          hints:
            readOnly: true
            openWorld: false
          call: "tazama-tms.get-health-status"
          outputParameters:
            - type: object
              mapping: "$."

        - name: evaluate-pain001-transaction
          description: "Submit an ISO 20022 pain.001.001.11 customer credit transfer for fraud and AML evaluation"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "tazama-tms.evaluate-pain001-transaction"
          with:
            transaction: "tools.transaction"
          outputParameters:
            - type: object
              mapping: "$."

        - name: evaluate-pacs008-transaction
          description: "Submit an ISO 20022 pacs.008.001.10 FI-to-FI credit transfer for fraud and AML evaluation"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "tazama-tms.evaluate-pacs008-transaction"
          with:
            transaction: "tools.transaction"
          outputParameters:
            - type: object
              mapping: "$."

        - name: evaluate-pacs002-transaction
          description: "Submit an ISO 20022 pacs.002.001.12 payment status report for fraud and AML evaluation"
          hints:
            readOnly: false
            destructive: false
            idempotent: false
          call: "tazama-tms.evaluate-pacs002-transaction"
          with:
            transaction: "tools.transaction"
          outputParameters:
            - type: object
              mapping: "$."
